<!DOCTYPE html>
<html lang="or">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>କୃଷିସେବା — KrishiSeva v2.0</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Odia:wght@400;600;700&family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --g50:#EAF3DE;--g100:#C5DFA0;--g200:#97C459;--g400:#549122;--g500:#3B6D11;--g600:#2E560D;--g700:#224009;--g800:#173404;
  --a50:#FEF4E3;--a100:#FAD99A;--a200:#F0B340;--a400:#C8841A;--a600:#8A5610;
  --t50:#E0F5EE;--t100:#9FE1CB;--t400:#1D9E75;--t600:#0F6E56;
  --r50:#FEF0F0;--r400:#E04444;--r600:#B52B2B;
  --gr50:#F5F4F0;--gr100:#E0DED7;--gr200:#B8B6AE;--gr400:#888780;--gr600:#58574F;--gr800:#3A3A35;
  --sb:248px;--tb:58px;--rad:10px;
  --font:'DM Sans',sans-serif;--font-od:'Noto Sans Odia',sans-serif;--font-s:'Playfair Display',serif;
}
html{font-size:14px;scroll-behavior:smooth}
body{font-family:var(--font);background:#EFF1EB;color:#2a2a25;min-height:100vh;-webkit-font-smoothing:antialiased}
.od{font-family:var(--font-od)!important}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:#f0f0ea}::-webkit-scrollbar-thumb{background:var(--g200);border-radius:3px}

/* LOGIN */
#loginScreen{position:fixed;inset:0;background:linear-gradient(140deg,#0e2205,#1e4a0a 50%,#2d6b18);display:flex;align-items:center;justify-content:center;z-index:1000}
.lbox{background:#fff;border-radius:18px;padding:44px 40px;width:420px;box-shadow:0 24px 64px rgba(0,0,0,.22)}
.lbrand{text-align:center;margin-bottom:28px}
.lbrand .icon{font-size:48px;display:block;margin-bottom:10px}
.lbrand h1{font-family:var(--font-s);font-size:28px;color:var(--g800);font-weight:700}
.lbrand .tag{font-family:var(--font-od);color:var(--gr400);font-size:13px;margin-top:5px}
.ltabs{display:flex;background:var(--g50);padding:4px;border-radius:10px;margin-bottom:22px;gap:4px}
.ltab{flex:1;padding:9px;border:none;background:transparent;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;color:var(--g500);font-family:var(--font);transition:all .15s}
.ltab.active{background:#fff;color:var(--g800);box-shadow:0 1px 4px rgba(0,0,0,.1)}
.fg{margin-bottom:16px}
.fg label{display:block;font-size:11px;font-weight:700;color:var(--gr600);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.fc{width:100%;padding:10px 14px;border:1.5px solid var(--gr100);border-radius:9px;font-family:var(--font);font-size:14px;color:#222;outline:none;transition:border-color .15s;background:#fff}
.fc:focus{border-color:var(--g400)}
select.fc{cursor:pointer}
textarea.fc{resize:vertical;min-height:80px}
.btn-login{width:100%;padding:12px;background:var(--g500);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;font-family:var(--font);cursor:pointer;transition:background .15s}
.btn-login:hover{background:var(--g800)}
.lnote{text-align:center;margin-top:14px;font-size:11px;color:var(--gr400)}
.ltoggle{position:fixed;top:16px;right:16px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;padding:7px 14px;border-radius:20px;cursor:pointer;font-size:13px;font-family:var(--font)}

/* SHELL */
#app{display:none;min-height:100vh}
.shell{display:flex;min-height:100vh}

/* SIDEBAR */
.sb{width:var(--sb);background:var(--g800);position:fixed;top:0;left:0;height:100vh;display:flex;flex-direction:column;overflow-y:auto;z-index:200}
.sb-brand{padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,.1);display:flex;align-items:center;gap:10px}
.sb-brand-icon{font-size:26px}
.sb-brand h1{font-family:var(--font-s);color:#fff;font-size:16px;font-weight:700;line-height:1.1}
.sb-brand p{color:var(--g100);font-size:10px;margin-top:2px;font-family:var(--font-od)}
.sb-user{padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.1);display:flex;align-items:center;gap:10px}
.sb-av{width:35px;height:35px;border-radius:50%;background:var(--g400);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px;flex-shrink:0}
.sb-uname{color:#fff;font-size:13px;font-weight:600}
.sb-urole{color:var(--g100);font-size:11px}
.sb-nav{flex:1;padding:8px 0;overflow-y:auto}
.sb-lbl{padding:8px 16px 4px;color:var(--g200);font-size:10px;text-transform:uppercase;letter-spacing:.08em;font-weight:700}
.ni{display:flex;align-items:center;gap:9px;padding:9px 16px;color:var(--g100);cursor:pointer;font-size:13px;position:relative;transition:all .15s;border:none;background:none;width:100%;text-align:left;font-family:var(--font)}
.ni:hover{background:rgba(255,255,255,.07);color:#fff}
.ni.act{background:var(--g500);color:#fff}
.ni.act::before{content:'';position:absolute;left:0;top:0;height:100%;width:3px;background:var(--g100);border-radius:0 2px 2px 0}
.ni-icon{font-size:15px;width:18px;text-align:center;flex-shrink:0}
.sb-sub .ni{font-size:12px;padding:7px 16px 7px 44px}
.sb-footer{padding:8px 0;border-top:1px solid rgba(255,255,255,.1)}
.logout{color:#ffb3b3!important}
.logout:hover{background:rgba(255,60,60,.1)!important}

/* MAIN */
.main{margin-left:var(--sb);flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{height:var(--tb);background:#fff;border-bottom:1px solid #e5e7df;padding:0 22px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.tb-title{font-family:var(--font-s);font-size:16px;font-weight:700;color:var(--g800)}
.tb-sub{font-size:11px;color:var(--gr400);margin-top:1px}
.tb-right{display:flex;align-items:center;gap:9px}
.tbb{border:1px solid var(--gr100);background:#fff;padding:6px 12px;border-radius:7px;cursor:pointer;font-size:12px;font-weight:500;color:var(--gr800);font-family:var(--font);transition:all .15s;display:flex;align-items:center;gap:5px}
.tbb:hover{background:var(--g50);border-color:var(--g200)}
.page{padding:22px;flex:1}

/* CARDS */
.card{background:#fff;border-radius:var(--rad);border:1px solid #e3e5dc;box-shadow:0 1px 3px rgba(0,0,0,.05);overflow:hidden;margin-bottom:14px}
.ch{padding:13px 18px;border-bottom:1px solid #f0f0ea;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.ch h3{font-size:14px;font-weight:700;color:var(--g800);display:flex;align-items:center;gap:7px}
.cb{padding:18px}

/* GRID */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.g13{display:grid;grid-template-columns:1fr 340px;gap:14px}
@media(max-width:900px){.g2,.g13{grid-template-columns:1fr}.g3{grid-template-columns:1fr 1fr}.g4{grid-template-columns:1fr 1fr}}
@media(max-width:600px){.g3,.g4,.g2{grid-template-columns:1fr}}

/* STAT */
.sc{background:#fff;border-radius:var(--rad);border:1px solid #e3e5dc;padding:14px 16px}
.sc-lbl{font-size:10px;color:var(--gr400);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px}
.sc-val{font-size:24px;font-weight:700;color:var(--g800);line-height:1}
.sc-sub{font-size:11px;color:var(--gr400);margin-top:3px}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
.bg{background:var(--g50);color:var(--g700)}
.ba{background:var(--a50);color:var(--a600)}
.bt{background:var(--t50);color:var(--t600)}
.br{background:var(--r50);color:var(--r600)}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 15px;border-radius:8px;border:none;cursor:pointer;font-family:var(--font);font-size:13px;font-weight:600;transition:all .15s;white-space:nowrap}
.bp{background:var(--g500);color:#fff}.bp:hover{background:var(--g800)}
.bs{background:var(--g50);color:var(--g700);border:1px solid var(--g100)}.bs:hover{background:var(--g100)}
.ba2{background:var(--a50);color:var(--a600);border:1px solid var(--a100)}.ba2:hover{background:var(--a200)}
.bt2{background:var(--t50);color:var(--t600);border:1px solid var(--t100)}.bt2:hover{background:var(--t100)}
.br2{background:var(--r50);color:var(--r600);border:1px solid #f5c6c6}.br2:hover{background:var(--r400);color:#fff}
.bsm{padding:5px 10px;font-size:12px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.w100{width:100%;justify-content:center}
.prtbtn{border:1px solid var(--g100);background:#fff;padding:6px 12px;border-radius:7px;font-size:12px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;color:var(--g600);font-family:var(--font);font-weight:500}
.prtbtn:hover{background:var(--g50)}

/* PAGE HEADER */
.ph{margin-bottom:20px;display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px}
.ph h2{font-family:var(--font-s);font-size:21px;font-weight:700;color:var(--g800)}
.ph p{color:var(--gr400);font-size:13px;margin-top:3px}
.ph-acts{display:flex;gap:8px;flex-wrap:wrap}

/* ALERTS */
.alert{padding:10px 14px;border-radius:9px;font-size:13px;margin-bottom:14px;display:flex;align-items:flex-start;gap:9px;line-height:1.5}
.as{background:var(--t50);color:var(--t600);border:1px solid var(--t100)}
.ai{background:#EDF2FF;color:#1a5fa8;border:1px solid #b9d0f7}
.aw{background:var(--a50);color:var(--a600);border:1px solid var(--a100)}
.ae{background:var(--r50);color:var(--r600);border:1px solid #f5c6c6}

/* SUBTABS */
.stabs{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:18px}
.stab{padding:7px 14px;border-radius:20px;border:1px solid var(--gr100);background:#fff;cursor:pointer;font-size:12px;font-weight:600;color:var(--gr600);font-family:var(--font);transition:all .15s}
.stab:hover:not(.act){background:var(--g50);border-color:var(--g200);color:var(--g700)}
.stab.act{background:var(--g500);color:#fff;border-color:var(--g500)}

/* TIMELINE */
.tl{position:relative;padding-left:22px}
.tl::before{content:'';position:absolute;left:6px;top:0;bottom:0;width:1.5px;background:var(--g100)}
.tli{position:relative;margin-bottom:18px}
.tli::before{content:'';position:absolute;left:-20px;top:5px;width:9px;height:9px;border-radius:50%;background:var(--g400);border:2px solid #fff;box-shadow:0 0 0 1.5px var(--g400)}
.tl-wk{font-size:10px;color:var(--g400);font-weight:700;text-transform:uppercase;margin-bottom:2px;letter-spacing:.06em}
.tl-task{font-size:13px;font-weight:700;color:var(--g800)}
.tl-det{font-size:12px;color:var(--gr600);margin-top:2px;line-height:1.5}

/* CALENDAR */
.cal-strip{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;margin-bottom:16px}
.cal-day{min-width:50px;border-radius:9px;padding:8px 6px;text-align:center;cursor:pointer;border:1.5px solid #eee;background:#fff;transition:all .15s;flex-shrink:0}
.cal-day:hover{border-color:var(--g300)}
.cal-day.today{border-color:var(--g400);background:var(--g50)}
.cal-day.has-ev{background:var(--g500);border-color:var(--g500)}
.cal-day.has-ev .cdn,.cal-day.has-ev .cdw{color:#fff}
.cal-day.sel{border-color:var(--a400);background:var(--a50)}
.cdw{font-size:9px;color:var(--gr400);text-transform:uppercase;letter-spacing:.05em}
.cdn{font-size:17px;font-weight:700;color:var(--g800);margin-top:1px;line-height:1}

/* DOSE BOX */
.dose-box{background:var(--g50);border-radius:9px;padding:12px;border:1px solid var(--g100)}
.dose-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.6)}
.dose-row:last-child{border-bottom:none}
.dn{font-size:13px;color:var(--g800);font-weight:600}
.dv{text-align:right}
.dv1{font-weight:700;color:var(--g700);font-size:13px}
.dv2{font-size:11px;color:var(--gr400)}

/* MAP PH */
.map-ph{background:linear-gradient(135deg,var(--g50),var(--t50));border-radius:10px;height:200px;display:flex;align-items:center;justify-content:center;border:1px dashed var(--g200);flex-direction:column;gap:8px;margin-bottom:16px;position:relative;overflow:hidden}
.map-ph::before{content:'🗺️';position:absolute;opacity:.05;font-size:160px;top:-20px;right:-20px;pointer-events:none}
.map-ph h4{font-size:14px;font-weight:700;color:var(--g600)}
.map-ph p{font-size:12px;color:var(--gr600)}
.plot-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;background:rgba(255,255,255,.8);color:var(--g700);font-size:11px;font-weight:600;border:1px solid var(--g100);margin:2px}

/* PRODUCTS */
.pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
@media(max-width:900px){.pgrid{grid-template-columns:1fr 1fr}}
@media(max-width:600px){.pgrid{grid-template-columns:1fr}}
.pc{background:#fff;border-radius:var(--rad);border:1px solid #e3e5dc;overflow:hidden;transition:all .2s}
.pc:hover{box-shadow:0 4px 14px rgba(0,0,0,.09);transform:translateY(-2px)}
.pc-img{height:110px;display:flex;align-items:center;justify-content:center;font-size:42px;background:linear-gradient(135deg,var(--g50),var(--t50))}
.pc-info{padding:12px}
.pc-name{font-size:13px;font-weight:700;color:#333;margin-bottom:3px}
.pc-price{font-size:14px;font-weight:700;color:var(--g600);margin-bottom:2px}
.pc-del{font-size:11px;color:var(--gr400)}
.ac-btn{width:100%;margin-top:8px;padding:7px;background:var(--g500);color:#fff;border:none;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font)}
.ac-btn:hover{background:var(--g800)}
.cart-badge{background:var(--a200);color:var(--a600);border-radius:20px;padding:1px 7px;font-size:11px;font-weight:700;margin-left:4px}

/* PHOTOS */
.photo-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
@media(max-width:700px){.photo-grid{grid-template-columns:repeat(2,1fr)}}
.pthumb{border-radius:8px;overflow:hidden;border:1px solid #e3e5dc;position:relative;aspect-ratio:1;background:var(--g50)}
.pthumb img{width:100%;height:100%;object-fit:cover}
.pthumb .ptag{position:absolute;bottom:5px;left:5px;right:5px;background:rgba(23,52,4,.75);color:#fff;font-size:10px;padding:3px 7px;border-radius:5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.upload-zone{border:2px dashed var(--g200);border-radius:10px;padding:28px;text-align:center;background:var(--g50);cursor:pointer;transition:all .2s}
.upload-zone:hover{border-color:var(--g400);background:var(--g100)}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px}
.overlay.hidden{display:none}
.modal{background:#fff;border-radius:16px;padding:28px;width:560px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.18)}
.modal.wide{width:720px}
.modal.narrow{width:420px}
.mhdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px}
.mhdr h2{font-family:var(--font-s);font-size:18px;color:var(--g800);font-weight:700}
.mhdr p{font-size:12px;color:var(--gr400);margin-top:3px}
.mclose{border:none;background:none;font-size:22px;cursor:pointer;color:var(--gr400);padding:2px;line-height:1}
.mclose:hover{color:var(--r600)}

/* VOICE */
.vfab{position:fixed;bottom:22px;right:22px;background:var(--g800);color:#fff;border:none;border-radius:28px;padding:11px 18px;display:flex;align-items:center;gap:9px;cursor:pointer;font-size:13px;font-weight:600;font-family:var(--font);box-shadow:0 4px 16px rgba(0,0,0,.2);z-index:400;transition:all .2s}
.vfab:hover{background:var(--g700)}
.vfab.speaking{background:var(--g400);animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(84,145,34,.5)}50%{box-shadow:0 0 0 12px rgba(84,145,34,0)}}
.vcap{position:fixed;bottom:76px;right:22px;background:rgba(23,52,4,.92);color:#fff;border-radius:12px;padding:10px 16px;max-width:320px;font-size:13px;z-index:399;line-height:1.5;display:none}
.vcap.show{display:block}

/* AI */
.ai-result{background:#fff;border-radius:9px;padding:14px;border:1px solid #d1dafe;font-size:13px;line-height:1.6;color:#1a1a2e;min-height:60px;margin-top:12px;white-space:pre-wrap}

/* COSTING */
.cost-row{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border-bottom:1px solid #f5f5f0}
.cost-row:last-child{border-bottom:none}
.cost-row:hover{background:#fafdf5}
.cr-item{font-size:13px;font-weight:500;color:#333}
.cr-cat{font-size:11px;color:var(--gr400)}
.cr-rate{font-size:13px;font-weight:700;color:var(--g600)}
.cr-unit{font-size:11px;color:var(--gr400)}

/* ADMIN SECTION */
.asec{background:#fff;border-radius:var(--rad);border:1px solid #e3e5dc;overflow:hidden;margin-bottom:14px}
.asec-hdr{padding:11px 16px;background:var(--g800);color:#fff;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:space-between;gap:8px}
.asec-body{padding:16px}

/* TABLE */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{padding:9px 12px;text-align:left;font-weight:700;color:var(--gr400);font-size:10px;text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid #eee;background:#fafaf7;white-space:nowrap}
.tbl td{padding:10px 12px;border-bottom:1px solid #f5f5f0;color:#333;vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:#fafdf5}
.sx{overflow-x:auto}

/* PROGRESS */
.pbar{height:6px;background:var(--gr100);border-radius:3px;overflow:hidden}
.pfill{height:100%;background:var(--g400);border-radius:3px;transition:width .4s}

/* PRINT */
@media print{
  .sb,.topbar,.vfab,.vcap,.no-print,.overlay{display:none!important}
  .main{margin-left:0!important}
  .page{padding:0!important}
  body{background:#fff!important}
  .card{box-shadow:none!important}
}

/* UTIL */
.hidden{display:none!important}
.flex{display:flex;align-items:center}
.flex-between{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.gap1{gap:6px}.gap2{gap:10px}
.mt1{margin-top:8px}.mt2{margin-top:16px}
.mb1{margin-bottom:8px}.mb2{margin-bottom:16px}
.fw7{font-weight:700}.tg{color:var(--g600)}.tm{color:var(--gr400)}.tsm{font-size:12px}.txs{font-size:11px}
.chip{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;background:var(--g50);color:var(--g700);font-size:11px;font-weight:600;border:1px solid var(--g100)}
.dvdr{border:none;border-top:1px solid #f0f0ea;margin:14px 0}
.radio-grp{display:flex;gap:8px;flex-wrap:wrap}
.ro{display:flex;align-items:center;gap:6px;padding:7px 13px;border:1.5px solid var(--gr100);border-radius:8px;cursor:pointer;font-size:13px;transition:all .15s;font-family:var(--font)}
.ro.active{border-color:var(--g400);background:var(--g50);color:var(--g700);font-weight:600}
.ro input{display:none}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <button class="ltoggle" onclick="toggleLang()">🌐 <span id="ltlbl">ଓଡ଼ିଆ</span></button>
  <div class="lbox">
    <div class="lbrand">
      <span class="icon">🌾</span>
      <h1>KrishiSeva</h1>
      <p class="tag">ଓଡ଼ିଶା କୃଷି ପ୍ରବନ୍ଧନ ମଞ୍ଚ</p>
    </div>
    <div class="ltabs">

const adminNav=[{sec:'Management',items:[

function buildNav(){
  const def=S.role==='admin'?adminNav:userNav;
  let h='';
  def.forEach(s=>{
    h+=`<div class="sb-lbl">${s.sec}</div>`;
    s.items.forEach(i=>{
      const act=S.page===i.k;
      h+=`<button class="ni${act?' act':''}" onclick="nav('${i.k}','${i.sub?i.sub[0].k:''}')"><span class="ni-icon">${i.ic}</span>${t(i.k)}</button>`;
      if(i.sub&&act){
        h+=`<div class="sb-sub">`;
        i.sub.forEach(si=>{h+=`<button class="ni${S.sub===si.k?' act':''}" onclick="nav('${i.k}','${si.k}')"><span class="ni-icon">${si.ic}</span>${t(si.k)}</button>`;});
        h+=`</div>`;
      }
    });
  });
  document.getElementById('sbNav').innerHTML=h;
}
function nav(p,s){
  S.page=p;S.sub=s||'';
  buildNav();
  document.getElementById('tbTitle').textContent=t(p);
  document.getElementById('tbSub').textContent=s?t(s):'';
  const fn=PAGES[p];
  document.getElementById('pageContent').innerHTML=fn?fn():`<div class="alert ai">ℹ️ Page coming soon.</div>`;
  window.scrollTo(0,0);
}

// ════════════════════════ VOICE ════════════════════════
function speak(txt){
  if(!window.speechSynthesis)return;
  const u=new SpeechSynthesisUtterance(txt);
  u.lang=S.lang==='od'?'or-IN':'en-IN';u.rate=0.88;u.pitch=1;
  window.speechSynthesis.cancel();window.speechSynthesis.speak(u);
  const c=document.getElementById('vcap');c.textContent=txt;c.classList.add('show');
  setTimeout(()=>c.classList.remove('show'),5000);
}
function handleVoice(){
  const fab=document.getElementById('vfab');fab.classList.toggle('speaking');
  const msgs={en:'Welcome to KrishiSeva. You are on the '+t(S.page)+' page.',od:'କୃଷିସେବାରେ ─ ସ୍ୱାଗତ। ─ '+t(S.page)+'─ ପୃଷ୍ଠାରେ ─ ଅଛନ୍ତି।'};
  speak(msgs[S.lang]);setTimeout(()=>fab.classList.remove('speaking'),3000);
}

function addCart(id){

  toast(`✅ ${S.lang==='od'?p.nOd||p.n:p.n} added`);

function openCheckout(){
  if(!S.cart.length){toast('Cart is empty','e');return;}
  let total=0,lines='';
  S.cart.forEach(it=>{total+=it.price;lines+=`<div class="flex-between" style="padding:6px 0;border-bottom:1px solid #f0f0ea;font-size:13px"><span>${it.em} ${S.lang==='od'?it.nOd||it.n:it.n}</span><span class="fw7 tg">₹${it.price}<span class="txs tm">${it.unit}</span></span></div>`;});
  document.getElementById('cartLines').innerHTML=`<div style="margin-bottom:12px">${lines}</div>`;
  document.getElementById('cartMeta').textContent=`${S.cart.length} item(s)`;
  document.getElementById('cartTotal').textContent=`₹${total.toLocaleString('en-IN')}`;
  openM('checkoutModal');
}
function onPayChange(){
  const v=document.getElementById('payM').value;
  document.getElementById('bankRow').classList.toggle('hidden',!['upi','credit','debit'].includes(v));

}
function placeOrder(){
  if(!document.getElementById('payM').value){toast('Select payment method','e');return;}
  closeM('checkoutModal');S.cart=[];
  toast(`🎉 ${S.lang==='od'?'ଅର୍ଡ଼ର ─ ସଫଳ!':'Order placed successfully!'}`);
}

// ════════════════════════ TOAST ════════════════════════
function toast(msg,type='s'){
  const d=document.createElement('div');
  d.style.cssText=`position:fixed;top:68px;right:20px;background:${type==='e'?'#b52b2b':'#2E560D'};color:#fff;padding:11px 18px;border-radius:9px;font-size:13px;font-weight:600;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,.2);font-family:var(--font);max-width:300px;transition:opacity .3s`;
  d.textContent=msg;document.body.appendChild(d);
  setTimeout(()=>{d.style.opacity='0';setTimeout(()=>d.remove(),400);},2800);
}

let _ffc={};
function openFieldForm(date,crop,cropCat,placeName){
  _ffc={date,crop,cropCat,placeName};
  document.getElementById('ffTitle').textContent='📋 '+(S.lang==='od'?'ଜମି ─ ତଥ୍ୟ ─ ଫର୍ମ':'Field Data Entry Form');
  document.getElementById('ffSub').textContent=`${crop} — ${placeName} | ${date}`;
  const qs=S.db.formQuestions;
  let h=`<div class="alert ai" style="margin-bottom:14px">📋 ${S.lang==='od'?'ଅଡ଼ମିନ ─ ଦ୍ୱାରା ─ ସ‌ ─ ‌ ─ ‌ ─ ‌ ─ ‌ ─ ‌ ─ ‌':'Admin-configured form. Fill all applicable fields and upload photos.'}</div><div class="g2">`;
  qs.forEach(q=>{
    const lbl=S.lang==='od'?(q.lblOd||q.lbl):q.lbl;
    if(q.type==='textarea'){
      h+=`</div><div class="fg"><label>${lbl}</label><textarea class="fc" id="ff_${q.k}" rows="2" placeholder="${lbl}..."></textarea></div><div class="g2">`;
    }else if(q.type==='select'){
      h+=`<div class="fg"><label>${lbl}</label><select class="fc" id="ff_${q.k}"><option value="">-- Select --</option>${q.opts.map(o=>`<option>${o}</option>`).join('')}</select></div>`;
    }else{
      h+=`<div class="fg"><label>${lbl}${q.unit?' ('+q.unit+')':''}</label><input type="${q.type}" class="fc" id="ff_${q.k}" placeholder="${lbl}" step="${q.step||1}" min="${q.min||0}" ${q.max?`max="${q.max}"`:''}/></div>`;
    }
  });
  h+=`</div>
  <hr class="dvdr">
  <div class="fg">
    <label>${S.lang==='od'?'ଚିତ୍ର ─ ଅପଲୋଡ (optional — stored in your profile)':'Field Photos (optional — tagged & stored in your profile)'}</label>
    <input type="file" class="fc" id="ff_photos" multiple accept="image/*" onchange="previewFF(event)">
    <div id="ffPrev" style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px"></div>
  </div>
  <div class="flex gap2 mt1">
    <button class="btn bp" style="flex:1;justify-content:center" onclick="submitFF()">✅ ${t('submit')}</button>
    <button class="btn bs" onclick="closeM('ffModal')">✕ ${t('cancel')}</button>
  </div>`;
  document.getElementById('ffBody').innerHTML=h;
  openM('ffModal');
}
function previewFF(e){
  const row=document.getElementById('ffPrev');if(!row)return;
  Array.from(e.target.files).forEach(f=>{
    const url=URL.createObjectURL(f);
    row.innerHTML+=`<img src="${url}" style="width:64px;height:64px;border-radius:8px;object-fit:cover;border:2px solid var(--g200)">`;
    S.photos.push({url,tag:`${_ffc.crop} ─ ${_ffc.date}`,date:_ffc.date,crop:_ffc.crop,cat:_ffc.cropCat,name:f.name});
  });
}
function submitFF(){
  const rec={..._ffc,farmer:S.user?.name||'Farmer',status:'submitted'};
  S.db.formQuestions.forEach(q=>{const el=document.getElementById(`ff_${q.k}`);if(el)rec[q.k]=el.value||'';});
  S.submitted.push(rec);
  S.db.farmRecords.unshift({...rec,place:_ffc.placeName,crop:_ffc.crop});
  closeM('ffModal');
  toast('✅ '+(S.lang==='od'?'ତଥ୍ୟ ─ ଦାଖଲ ─ ହୋଇଛି!':'Data submitted successfully!'));
  nav('dataEntry');
}
function exportCSV(){
  const rows=S.db.farmRecords;
  if(!rows.length){toast('No data','e');return;}
  const hdr=['Farmer','Place','Crop','Date','pH','EC','OC','N','P','K','S','NutType','NutUsed','NutCost','ProtType','ProtUsed','ProtCost','Irrigations','LabourCost','MachCost','Produce','Harvest_qtl','MktPrice_Rs','Revenue_Rs'];
  const csv=[hdr.join(','),...rows.map(r=>[r.farmer,r.place,r.crop,r.date,r.soilPH,r.ec,r.oc,r.rN,r.rP,r.rK,r.rS,r.nutType,`"${r.nutUsed||''}"`,r.nutCost,r.protType,`"${r.protUsed||''}"`,r.protCost,r.irrigations,r.labourCost,r.machCost,r.produce,r.harvest,r.mktPrice,r.revenue].join(','))].join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='krishiseva_farmdata.csv';a.click();
  toast('✅ CSV downloaded!');
}

function cropSel(id,cat,onCh){
  const crops=cat&&S.db.crops[cat]?S.db.crops[cat]:[];
  return`<select class="fc" id="${id}" ${!cat?'disabled':''} onchange="${onCh?onCh+'()':''}"><option value="">-- ${t('selectCrop')} --</option>${crops.map(c=>`<option value="${c.name}">${c.name}</option>`).join('')}</select>`;

function placeSel(id,onCh){
  return`<select class="fc" id="${id}" onchange="${onCh?onCh+'()':''}"><option value="">-- ${t('selectPlace')} --</option>${S.db.places.map(p=>`<option value="${p.id}">${plName(p)}</option>`).join('')}</select>`;
}
function calHtml(stripId,clickFn){
  const today=new Date();const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  let h=`<div class="cal-strip" id="${stripId}">`;
  for(let i=0;i<14;i++){
    const d=new Date(today);d.setDate(today.getDate()+i);
    const hasEv=[0,2,5,8,11].includes(i);
    h+=`<div class="cal-day${i===0?' today':''}${hasEv?' has-ev':''}" onclick="${clickFn}(this,'${d.toDateString()}')"><div class="cdw">${days[d.getDay()]}</div><div class="cdn">${d.getDate()}</div></div>`;
  }
  return h+`</div>`;
}
function doseBox(arr){
  if(!arr||!arr.length)return`<div class="alert ai">No data yet.</div>`;
  return`<div class="dose-box">${arr.map(d=>`<div class="dose-row"><span class="dn">${d.n}</span><div class="dv"><div class="dv1">${d.t}</div><div class="dv2">${d.st}</div></div></div>`).join('')}</div>`;

  return`<div class="ph"><div><h2>${t('costing')}</h2><p>${S.lang==='od'?'ଚ‌ ─ ‌ ─ ‌ ─ ‌':'Itemised investment costs for all farming activities'}</p></div>
  <div class="ph-acts no-print"><button class="prtbtn" onclick="window.print()">🖨️ ${t('print')}</button></div></div>
  <div class="stabs no-print" id="costTabs">${cats.map(c=>`<button class="stab${ak===c.k?' act':''}" onclick="filterCost('${c.k}',this)">${c.l}</button>`).join('')}</div>
  <div id="costBody">${costRows(ak)}</div>
  <div class="card mt2">
    <div class="ch"><h3>🧮 ${S.lang==='od'?'ଖ‌ ─ ‌ ─ ‌ ─ ‌':'Cost Calculator'}</h3></div>
    <div class="cb">
      <div class="g2">
        <div class="fg"><label>${S.lang==='od'?'ଜ‌ ─ ‌ (acres)':'Area (acres)'}</label><input class="fc" type="number" id="calcArea" value="1" step="0.5" min="0.5" oninput="calcCost()"></div>
        <div class="fg"><label>${t('selectCropCat')}</label>${catSel('calcCat','calcCost')}</div>
      </div>
      <div id="calcResult" class="alert ai">Enter area and select crop category to estimate total investment.</div>
    </div>
  </div>`;
};
function filterCost(cat,el){
  S._costCat=cat;
  document.querySelectorAll('#costTabs .stab').forEach(b=>b.classList.remove('act'));el.classList.add('act');
  const rows=S.db.costings[cat]||[];
  const b=document.getElementById('costBody');if(!b)return;
  if(!rows.length){b.innerHTML=`<div class="alert ai">No data yet.</div>`;return;}
  b.innerHTML=`<div class="card" style="margin-bottom:0"><div style="padding:0">${rows.map(r=>`<div class="cost-row"><div><div class="cr-item">${iName(r)}</div><div class="cr-cat txs">${r.cat}</div></div><div style="text-align:right"><div class="cr-rate">₹${r.rate.toLocaleString('en-IN')}</div><div class="cr-unit txs tm">${r.unit}</div></div></div>`).join('')}</div></div>`;
}
function calcCost(){
  const area=parseFloat(document.getElementById('calcArea')?.value)||1;
  const cat=document.getElementById('calcCat')?.value;
  const res=document.getElementById('calcResult');
  if(!cat||!res){if(res)res.className='alert ai';return;}
  const est={cereals:{land:1200,labour:5000,nutrients:4500,protection:1500,misc:800},vegetables:{land:1200,labour:8000,nutrients:6000,protection:2500,misc:1500},fruits:{land:0,labour:12000,nutrients:8000,protection:3000,misc:2000},pulses:{land:1200,labour:4000,nutrients:2500,protection:1000,misc:600},oilseeds:{land:1200,labour:4500,nutrients:3500,protection:1200,misc:700},spices:{land:1200,labour:10000,nutrients:7000,protection:2500,misc:1800},medicinal:{land:0,labour:8000,nutrients:5000,protection:2000,misc:1500},flowers:{land:1200,labour:9000,nutrients:6000,protection:2000,misc:1500},condiments:{land:1200,labour:5000,nutrients:3500,protection:1200,misc:800}};
  const e=est[cat]||est.cereals;
  const total=Object.values(e).reduce((a,b)=>a+b,0)*area;
  res.className='card mt1';
  res.innerHTML=`<div style="padding:0">${Object.entries(e).map(([k,v])=>`<div class="cost-row"><div class="cr-item">${k.charAt(0).toUpperCase()+k.slice(1)}</div><div class="cr-rate">₹${(v*area).toLocaleString('en-IN')}</div></div>`).join('')}<div class="cost-row" style="background:var(--g50)"><div class="fw7" style="color:var(--g800);font-size:14px">Total Estimated (${area} ac)</div><div class="cr-rate fw7" style="font-size:15px">₹${total.toLocaleString('en-IN')}</div></div></div>`;
}

// ── AI ASSISTANT ─────────────────────────────
PAGES.aiAssistant=function(){
  const sugg=[
    {en:'Best time to apply Urea in Kharif paddy?',od:'ଖ‌ ─ ‌ ─ ‌ ─ Urea ─ ‌ ─ ‌ ─ ‌?'},
    {en:'Organic treatment for tomato fruit borer?',od:'ଟ‌ ─ ‌ ─ ‌ ─ ‌ ─ ‌ ─ ‌?'},
    {en:'Water requirement for groundnut in Odisha?',od:'ଗ‌ ─ ‌ ─ ‌ ─ ‌ ─ ‌ ─ ‌?'},
    {en:'How to improve soil pH for acidic soil?',od:'ଏ‌ ─ ‌ ─ ‌ ─ ‌ ─ pH ─ ‌ ─ ‌?'},
    {en:'Best maize variety for Odisha Kharif?',od:'ଓ‌ ─ ‌ ─ ‌ ─ ‌ ─ ‌ ─ ‌?'},
    {en:'Dose of Trichoderma for vegetable seedlings?',od:'ଟ‌ ─ ‌ ─ ‌ ─ ‌ ─ ‌?'},
    {en:'Recommended spacing for banana in Odisha?',od:'ଓ‌ ─ ‌ ─ ‌ ─ ‌ ─ ‌?'},
    {en:'Signs and treatment of blast disease in paddy?',od:'ଧ‌ ─ ‌ ─ ‌ ─ ‌ ─ ‌?'},
  ];
  return`<div class="ph"><div><h2>🤖 ${t('aiAssistant')}</h2><p>${S.lang==='od'?'ଚ‌ ─ ‌ ─ ‌ ─ ‌':'ChatGPT/Claude-powered — answers queries not in local database'}</p></div></div>
  <div class="g2">
    <div class="card">
      <div class="ch"><h3>💬 ${S.lang==='od'?'ପ‌ ─ ‌ ─ ‌':'Ask Anything'}</h3></div>
      <div class="cb">
        <div class="fg"><label>${S.lang==='od'?'ଆ‌ ─ ‌ ─ ‌':'Your Question'}</label>
          <textarea class="fc" id="aiQ" rows="4" placeholder="${S.lang==='od'?'ଆ‌ ─ ‌ ─ ‌ ─ ‌ ─ ‌ ─ ‌?':'e.g. What is the recommended dose of Urea for Kharif paddy in Odisha?'}"></textarea>
        </div>
        <div class="fg">
          <label>${S.lang==='od'?'ଭ‌ ─ ‌':'Language'}</label>
          <div class="radio-grp">
            <label class="ro active" id="aiLangEn" onclick="this.parentNode.querySelectorAll('.ro').forEach(r=>r.classList.remove('active'));this.classList.add('active')"><input type="radio" name="aiLang" value="en" checked>English</label>
            <label class="ro" id="aiLangOd" onclick="this.parentNode.querySelectorAll('.ro').forEach(r=>r.classList.remove('active'));this.classList.add('active')"><input type="radio" name="aiLang" value="od">ଓଡ଼ିଆ</label>
          </div>
        </div>
        <button class="btn bp w100" onclick="doAI()" id="aiBtn">🔍 ${S.lang==='od'?'ଉ‌ ─ ‌ ─ ‌':'Get Answer'}</button>
        <div id="aiRes" class="hidden"></div>
      </div>
    </div>
    <div class="card">
      <div class="ch"><h3>💡 ${S.lang==='od'?'ସ‌ ─ ‌ ─ ‌':'Suggested Questions'}</h3></div>
      <div class="cb">
        ${sugg.map(q=>`<button style="width:100%;text-align:left;padding:10px 12px;border:1px solid var(--gr100);border-radius:8px;background:#fff;cursor:pointer;font-size:13px;font-family:var(--font);margin-bottom:8px;transition:background .15s;color:#333" onmouseover="this.style.background='var(--g50)'" onmouseout="this.style.background='#fff'" onclick="prefillAI('${(S.lang==='od'?q.od:q.en).replace(/'/g,&quot;\\'&quot;)}')">💬 ${S.lang==='od'?q.od:q.en}</button>`).join('')}
      </div>
    </div>
  </div>`;
};
function prefillAI(q){const el=document.getElementById('aiQ');if(el){el.value=q;el.focus();}}
function openAIFor(ctx){
  nav('aiAssistant');
  const prefills={nutrients:S.lang==='od'?'ଫ‌ ─ ‌ ─ ‌ ─ ‌ ─ ‌ ─ ‌?':`Nutrient recommendation for my crop — please advise`,protection:S.lang==='od'?'ଉ‌ ─ ‌ ─ ‌ ─ ‌?':`Plant protection treatment for my crop`};
  setTimeout(()=>{const el=document.getElementById('aiQ');if(el){el.value=prefills[ctx]||'';el.focus();}},200);
}
async function doAI(){
  const q=document.getElementById('aiQ')?.value?.trim();
  if(!q){toast('Enter a question','e');return;}
  const lang=document.querySelector('input[name="aiLang"]:checked')?.value||'en';
  const btn=document.getElementById('aiBtn');
  if(btn){btn.disabled=true;btn.textContent='⏳ Asking AI...';}
  const res=document.getElementById('aiRes');
  res?.classList.remove('hidden');
  if(res)res.innerHTML='<div class="ai-result">Connecting to AI assistant...</div>';
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:`You are KrishiSeva AI, an expert agricultural assistant for Odisha, India. Answer in ${lang==='od'?'Odia script (Odia language)':'clear English'}. Be practical, farmer-friendly, specific with doses and timings. Question: ${q}`}]})});
    const d=await r.json();
    const ans=d.content?.[0]?.text||'No response.';
    if(res)res.innerHTML=`<div class="ai-result">${ans}</div>`;
    speak((S.lang==='od'?'AI ─ ‌ ─ ‌: ':'AI says: ')+ans.substring(0,200));
  }catch{
    const demo=S.lang==='od'
      ?`ଆ‌ ─ ‌ "${q}":\n\n• ─ ‌ ─ ‌ KVK ─ ‌ ─ ‌ ─ ‌ ─ ‌।\n• ─ ‌ ─ ‌ ─ ‌ ─ ‌ ─ ‌ ─ ‌।\n• Kisan Call Centre: 1800-180-1551 (Toll Free)\n• PM-KISAN: pmkisan.gov.in\n\n⚠️ Live AI: API key required.`
      :`Advisory for "${q}":\n\n• Contact your nearest Krishi Vigyan Kendra (KVK) for location-specific guidance.\n• Odisha Dept of Agriculture: agriodisha.nic.in\n• Kisan Call Centre: 1800-180-1551 (Toll Free, 24×7)\n• PM-KISAN portal: pmkisan.gov.in\n\n⚠️ For live AI responses, configure the Anthropic API key in the backend.`;
    if(res)res.innerHTML=`<div class="ai-result">${demo}</div>`;
  }
  if(btn){btn.disabled=false;btn.textContent='🔍 '+(S.lang==='od'?'ଉ‌ ─ ‌':'Get Answer');}
}
